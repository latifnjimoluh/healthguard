<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="manifest" href="/app/manifest.json">
  <link rel="icon" type="image/png" href="/app/assets/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>HealthGuard IA - Connexion</title>
  <link rel="stylesheet" href="../css/healthguard.css">
  <style>
    .agent-list { padding: 0 16px; }
    .agent-card {
      display: flex; align-items: center; gap: 14px;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 12px; padding: 14px 16px;
      margin-bottom: 10px; cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .agent-card:hover, .agent-card:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 2px rgba(0,150,136,0.18);
      outline: none;
    }
    .agent-avatar {
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--color-primary); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 700; flex-shrink: 0;
    }
    .agent-info { flex: 1; }
    .agent-nom { font-weight: 600; font-size: 15px; }
    .agent-role { font-size: 12px; color: var(--color-text-secondary); margin-top: 2px; }
    .agent-chevron { color: var(--color-text-secondary); font-size: 18px; }
    .back-btn {
      background: none; border: none; cursor: pointer;
      color: var(--color-primary); font-size: 14px; font-weight: 600;
      padding: 8px 16px; display: flex; align-items: center; gap: 6px;
    }
    .step { display: none; }
    .step.active { display: block; }
    .add-agent-btn {
      display: flex; align-items: center; gap: 10px;
      background: none; border: 2px dashed var(--color-border);
      border-radius: 12px; padding: 12px 16px;
      width: 100%; cursor: pointer; color: var(--color-text-secondary);
      font-size: 14px; margin-top: 4px; transition: border-color 0.15s;
    }
    .add-agent-btn:hover { border-color: var(--color-primary); color: var(--color-primary); }
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.45); z-index: 100;
      align-items: flex-end; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal-sheet {
      background: var(--color-surface); border-radius: 20px 20px 0 0;
      padding: 24px 20px 32px; width: 100%; max-width: 420px;
    }
    .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
    .form-group { margin-bottom: 14px; }
    .form-label { font-size: 13px; color: var(--color-text-secondary); margin-bottom: 4px; display: block; }
    .form-input {
      width: 100%; padding: 12px; border-radius: 8px;
      border: 1px solid var(--color-border); font-size: 15px;
      background: var(--color-bg); color: var(--color-text); box-sizing: border-box;
    }
  </style>
</head>
<body>
<div class="app-container">
  <div class="status-bar">
    <span class="time" id="current-time">08:24</span>
    <span class="offline-badge" id="network-badge">● HORS LIGNE</span>
  </div>

  <div class="logo-container">
    <div class="logo-icon"><img src="../assets/logo.png" alt="Logo HealthGuard IA" class="logo-image"></div>
    <div class="logo-title">HealthGuard IA</div>
    <div class="logo-subtitle" id="etablissement-name">Centre de Sante de Ngaoundere Rural</div>
  </div>

  <div class="step active" id="step-select">
    <p style="text-align:center;color:var(--color-text-secondary);font-size:14px;padding:4px 16px 12px;">
      Selectionnez votre compte
    </p>
    <div class="agent-list" id="agent-list"></div>
    <div style="padding:0 16px;">
      <button class="add-agent-btn" onclick="openAddAgent()">
        <span style="font-size:20px;">＋</span> Ajouter un compte
      </button>
    </div>
    <div style="padding:16px;">
      <button class="btn btn-danger btn-full" onclick="urgenceAccess()" style="opacity:0.85;">
        Acces Urgence (sans identification)
      </button>
    </div>
  </div>

  <div class="step" id="step-pin">
    <button class="back-btn" onclick="goBack()">← Changer de compte</button>
    <p style="text-align:center;color:var(--color-text-secondary);font-size:14px;padding:4px 16px 12px;">
      PIN pour <strong id="selected-agent-name">-</strong>
    </p>

    <div class="pin-display" id="pin-display">
      <div class="pin-dot" id="dot-0"></div>
      <div class="pin-dot" id="dot-1"></div>
      <div class="pin-dot" id="dot-2"></div>
      <div class="pin-dot" id="dot-3"></div>
      <div class="pin-dot" id="dot-4"></div>
      <div class="pin-dot" id="dot-5"></div>
    </div>

    <div id="error-msg" style="display:none;text-align:center;color:var(--color-rouge);font-weight:600;padding:8px 16px;font-size:14px;"></div>

    <div class="pin-keyboard">
      <button class="pin-key" onclick="pressKey('1')">1</button>
      <button class="pin-key" onclick="pressKey('2')">2</button>
      <button class="pin-key" onclick="pressKey('3')">3</button>
      <button class="pin-key" onclick="pressKey('4')">4</button>
      <button class="pin-key" onclick="pressKey('5')">5</button>
      <button class="pin-key" onclick="pressKey('6')">6</button>
      <button class="pin-key" onclick="pressKey('7')">7</button>
      <button class="pin-key" onclick="pressKey('8')">8</button>
      <button class="pin-key" onclick="pressKey('9')">9</button>
      <button class="pin-key" style="font-size:12px;color:var(--color-primary);font-weight:700;" onclick="loginBiometric()">BIO</button>
      <button class="pin-key" onclick="pressKey('0')">0</button>
      <button class="pin-key delete" onclick="deleteKey()">⌫</button>
    </div>
  </div>

  <div class="legal-mention">Version 1.1 - Usage reserve au personnel de sante habilite</div>
</div>

<div class="modal-overlay" id="add-agent-modal">
  <div class="modal-sheet">
    <div class="modal-title">Nouveau compte agent</div>
    <div class="form-group">
      <label class="form-label">Nom complet</label>
      <input class="form-input" id="new-agent-nom" type="text" placeholder="ex: Fatima Oumarou">
    </div>
    <div class="form-group">
      <label class="form-label">Role</label>
      <select class="form-input" id="new-agent-role">
        <option>Infirmiere</option>
        <option>Agent de sante</option>
        <option>Medecin</option>
        <option>Sage-femme</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">PIN (6 chiffres)</label>
      <input class="form-input" id="new-agent-pin" type="password" inputmode="numeric" maxlength="6" placeholder="••••••">
    </div>
    <div id="new-agent-error" style="color:var(--color-rouge);font-size:13px;margin-bottom:8px;display:none;"></div>
    <button class="btn btn-primary btn-full" onclick="saveNewAgent()" style="margin-bottom:10px;">
      Creer le compte
    </button>
    <button class="btn btn-full" onclick="closeAddAgent()" style="background:transparent;border:1px solid var(--color-border);color:var(--color-text);">
      Annuler
    </button>
  </div>
</div>

<script>
  const API = '';
  let pin = '';
  let selectedAgent = null;

  const DEFAULT_AGENTS = [
    { id: 'agent_aminatou', nom: 'Aminatou Wali', role: 'Infirmiere', demo_pin: '246810' },
    { id: 'agent_ibrahim', nom: 'Ibrahim Hamadou', role: 'Agent de sante', demo_pin: '135791' }
  ];

  const DEMO_IDS = new Set(DEFAULT_AGENTS.map(a => a.id));

  function initiale(nom) {
    return nom ? nom.trim()[0].toUpperCase() : '?';
  }

  function normalizeAgent(agent) {
    return {
      id: agent.id,
      nom: agent.nom,
      role: agent.role,
      pin_hash: agent.pin_hash || null,
      demo_pin: agent.demo_pin || agent.pin || null
    };
  }

  function getAgents() {
    let agents = JSON.parse(localStorage.getItem('hg_agents') || 'null');
    if (!agents) {
      agents = DEFAULT_AGENTS.map(normalizeAgent);
      localStorage.setItem('hg_agents', JSON.stringify(agents));
    }
    return agents.map(normalizeAgent);
  }

  async function apiHashPin(rawPin) {
    const response = await fetch(`${API}/api/v1/security/pin/hash`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pin: rawPin }),
      signal: AbortSignal.timeout(3000)
    });
    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      throw new Error(err.detail || 'Hash PIN impossible');
    }
    const data = await response.json();
    return data.pin_hash;
  }

  async function apiVerifyPin(rawPin, storedHash) {
    const response = await fetch(`${API}/api/v1/security/pin/verify`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pin: rawPin, stored_hash: storedHash }),
      signal: AbortSignal.timeout(3000)
    });
    if (!response.ok) return false;
    const data = await response.json();
    return !!data.valid;
  }

  async function ensureHashedAgents() {
    const agents = getAgents();
    let changed = false;
    for (const agent of agents) {
      if (!agent.pin_hash && agent.demo_pin) {
        try {
          agent.pin_hash = await apiHashPin(agent.demo_pin);
          changed = true;
        } catch (e) {
          console.warn('Migration PIN differee pour', agent.id, e);
        }
      }
      delete agent.pin;
    }
    if (changed) localStorage.setItem('hg_agents', JSON.stringify(agents));
    return agents;
  }

  function renderAgents(list) {
    const el = document.getElementById('agent-list');
    el.innerHTML = list.map(a => {
      // Masquer les PIN de demo de l'interface (Audit Fix)
      const pinHint = ''; 
      return `
        <div class="agent-card" tabindex="0" onclick="selectAgent('${a.id}')" onkeydown="if(event.key==='Enter')selectAgent('${a.id}')">
          <div class="agent-avatar">${initiale(a.nom)}</div>
          <div class="agent-info">
            <div class="agent-nom">${a.nom}</div>
            <div class="agent-role">${a.role}</div>
            ${pinHint}
          </div>
          <span class="agent-chevron">›</span>
        </div>
      `;
    }).join('');
  }

  async function loadAgents() {
    try {
      const ctrl = new AbortController();
      setTimeout(() => ctrl.abort(), 4000);
      const r = await fetch(`${API}/api/v1/agents`, { signal: ctrl.signal });
      if (!r.ok) {
        // Fallback local si l'API est eteinte
        renderAgents(getAgents());
        return;
      }
      const data = await r.json();
      if (data.agents) {
        localStorage.setItem('hg_agents', JSON.stringify(data.agents));
        renderAgents(data.agents);
      }
    } catch (e) {
      console.warn('API agents indisponible', e);
      renderAgents(getAgents());
    }
  }

  function selectAgent(agentId) {
    const agents = getAgents();
    selectedAgent = agents.find(a => a.id === agentId);
    if (!selectedAgent) return;
    document.getElementById('selected-agent-name').textContent = selectedAgent.nom;
    pin = '';
    updateDots();
    document.getElementById('error-msg').style.display = 'none';
    document.getElementById('step-select').classList.remove('active');
    document.getElementById('step-pin').classList.add('active');
  }

  function goBack() {
    pin = '';
    updateDots();
    document.getElementById('step-pin').classList.remove('active');
    document.getElementById('step-select').classList.add('active');
  }

  function pressKey(digit) {
    if (pin.length >= 6) return;
    pin += digit;
    updateDots();
    if (pin.length === 6) setTimeout(() => { validatePin(); }, 100);
  }

  function deleteKey() {
    pin = pin.slice(0, -1);
    updateDots();
    document.getElementById('error-msg').style.display = 'none';
  }

  function updateDots() {
    for (let i = 0; i < 6; i++) {
      document.getElementById('dot-' + i).classList.toggle('filled', i < pin.length);
    }
  }

  async function validatePin() {
    if (!selectedAgent) return;
    let valid = false;
    try {
      if (selectedAgent.pin_hash) {
        valid = await apiVerifyPin(pin, selectedAgent.pin_hash);
      } else if (selectedAgent.demo_pin) {
        valid = pin === selectedAgent.demo_pin;
      }
    } catch (e) {
      valid = !!selectedAgent.demo_pin && pin === selectedAgent.demo_pin;
    }

    if (valid) {
      localStorage.setItem('hg_agent_id', selectedAgent.id);
      localStorage.setItem('hg_agent_nom', selectedAgent.nom);
      localStorage.setItem('hg_session_start', Date.now());
      window.location.href = 'e2_dashboard.html';
      return;
    }

    const errMsg = document.getElementById('error-msg');
    errMsg.textContent = 'PIN incorrect - Veuillez reessayer';
    errMsg.style.display = 'block';
    pin = '';
    updateDots();
    if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
  }

  async function loginBiometric() {
    if (!selectedAgent) return;
    
    try {
      // 1. Verifier si l'agent a la biometrie activee (via options)
      const response = await fetch(`${API}/api/v1/security/biometric/login/options?agent_id=${selectedAgent.id}`);
      if (!response.ok) {
        hgAlert("La biométrie n'est pas configurée pour ce compte. Utilisez votre code PIN.", "Information", "Fermer");
        return;
      }
      const options = await response.json();

      // 2. Simulation du scan (WebAuthn navigator.credentials.get)
      hgConfirm(
        `Scan biométrique pour ${selectedAgent.nom}...`,
        "Authentification",
        async function() {
          // Simulation succes apres delai
          const verifyRes = await fetch(`${API}/api/v1/security/biometric/login/verify`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              agent_id: selectedAgent.id,
              credential_id: 'fake_cred_id'
            })
          });

          if (verifyRes.ok) {
            localStorage.setItem('hg_agent_id', selectedAgent.id);
            localStorage.setItem('hg_agent_nom', selectedAgent.nom);
            localStorage.setItem('hg_session_start', Date.now());
            window.location.href = 'e2_dashboard.html';
          }
        },
        null,
        "👆",
        "Scanner"
      );

    } catch (e) {
      console.error(e);
      hgAlert("Erreur biométrique.", "Erreur", "Fermer");
    }
  }

  function urgenceAccess() {
    hgConfirm(
      'Les consultations en mode urgence ne seront pas associees a un agent identifie.',
      'Acces Urgence',
      function () {
        localStorage.setItem('hg_agent_id', 'urgence_anonyme');
        localStorage.setItem('hg_agent_nom', 'Urgence (anonyme)');
        window.location.href = 'e2_dashboard.html';
      },
      null,
      '🚨',
      'Continuer',
      'btn-danger'
    );
  }

  function openAddAgent() {
    document.getElementById('add-agent-modal').classList.add('open');
    setTimeout(() => document.getElementById('new-agent-nom').focus(), 100);
  }

  function closeAddAgent() {
    document.getElementById('add-agent-modal').classList.remove('open');
    document.getElementById('new-agent-nom').value = '';
    document.getElementById('new-agent-pin').value = '';
    document.getElementById('new-agent-error').style.display = 'none';
  }

  async function saveNewAgent() {
    const nom = document.getElementById('new-agent-nom').value.trim();
    const role = document.getElementById('new-agent-role').value;
    const newPin = document.getElementById('new-agent-pin').value.trim();
    const errEl = document.getElementById('new-agent-error');

    if (!nom) {
      errEl.textContent = 'Le nom est obligatoire';
      errEl.style.display = 'block';
      return;
    }
    if (!/^\d{6}$/.test(newPin)) {
      errEl.textContent = 'Le PIN doit comporter exactement 6 chiffres';
      errEl.style.display = 'block';
      return;
    }

    try {
      const response = await fetch(`${API}/api/v1/agents/new`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nom, role, pin: newPin }),
        signal: AbortSignal.timeout(5000)
      });
      
      const res = await response.json();
      if (!response.ok) throw new Error(res.detail || 'Erreur lors de la creation');
      
      // On recharge la liste depuis le serveur
      await loadAgents();
      closeAddAgent();
      hgAlert(`Compte cree pour ${nom}.`, 'Succes', 'OK');
    } catch (e) {
      errEl.textContent = e.message || 'API locale indisponible';
      errEl.style.display = 'block';
    }
  }

  function updateClock() {
    const now = new Date();
    document.getElementById('current-time').textContent =
      String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
  }
  updateClock();
  setInterval(updateClock, 10000);

  function updateNetworkStatus() {
    const badge = document.getElementById('network-badge');
    if (navigator.onLine) {
      badge.textContent = '● EN LIGNE';
      badge.style.backgroundColor = 'var(--color-vert)';
    } else {
      badge.textContent = '● HORS LIGNE';
      badge.style.backgroundColor = 'var(--color-orange)';
    }
  }
  updateNetworkStatus();
  window.addEventListener('online', updateNetworkStatus);
  window.addEventListener('offline', updateNetworkStatus);

  document.addEventListener('keydown', (e) => {
    if (document.getElementById('step-pin').classList.contains('active')) {
      if (/^[0-9]$/.test(e.key)) pressKey(e.key);
      if (e.key === 'Backspace') deleteKey();
    }
  });

  loadAgents();
</script>
<script src="../js/nav.js"></script>
</body>
</html>
