<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="manifest" href="/app/manifest.json">
  <link rel="icon" type="image/png" href="/app/assets/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>HealthGuard IA - Dossier Patient</title>
  <link rel="stylesheet" href="../css/healthguard.css">
  <style>
    .search-bar { padding: 10px 12px; background: white; border-bottom: 1px solid var(--color-border); }
    .search-input { width: 100%; padding: 10px 14px; border: 1.5px solid var(--color-border); border-radius: 24px; font-size: 15px; background: var(--color-background); }
    .search-input:focus { outline: none; border-color: var(--color-primary); background: white; }
    .patient-list { padding: 8px 0; }
    .patient-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: white; border-bottom: 1px solid var(--color-border); cursor: pointer; transition: background 0.15s; }
    .patient-item:hover, .patient-item:active { background: var(--color-primary-light); }
    .patient-avatar { width: 44px; height: 44px; border-radius: 50%; background: var(--color-primary); color: white; font-size: 18px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .patient-avatar.f { background: #AD1457; }
    .patient-info { flex: 1; min-width: 0; }
    .patient-name { font-size: 15px; font-weight: 600; color: var(--color-text-primary); }
    .patient-meta { font-size: 12px; color: var(--color-text-secondary); margin-top: 2px; }
    .patient-badge { font-size: 11px; padding: 3px 8px; border-radius: 12px; font-weight: 600; white-space: nowrap; }
    .badge-rouge { background: var(--color-rouge-light); color: var(--color-rouge-dark); }
    .badge-orange { background: var(--color-orange-light); color: #E65100; }
    .badge-vert { background: var(--color-vert-light); color: #1B5E20; }
    .record-header { background: var(--color-primary); color: white; padding: 16px; margin: 0; }
    .record-name { font-size: 20px; font-weight: 700; }
    .record-meta { font-size: 13px; opacity: 0.85; margin-top: 4px; }
    .record-tabs { display: flex; background: white; border-bottom: 1px solid var(--color-border); }
    .record-tab { flex: 1; padding: 12px 4px; text-align: center; font-size: 13px; font-weight: 500; color: var(--color-text-secondary); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; }
    .record-tab.active { color: var(--color-primary); border-bottom-color: var(--color-primary); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .consult-hist-item { padding: 12px 16px; background: white; border-bottom: 1px solid var(--color-border); display: flex; align-items: center; gap: 12px; }
    .consult-dot-big { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .consult-dot-big.rouge { background: var(--color-rouge); }
    .consult-dot-big.orange { background: var(--color-orange); }
    .consult-dot-big.vert { background: var(--color-vert); }
    .info-row { display: flex; padding: 10px 16px; background: white; border-bottom: 1px solid var(--color-border); }
    .info-label { font-size: 13px; color: var(--color-text-secondary); width: 120px; flex-shrink: 0; }
    .info-value { font-size: 14px; color: var(--color-text-primary); font-weight: 500; }
    .empty-state { text-align: center; padding: 40px 20px; color: var(--color-text-secondary); }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .new-patient-btn { margin: 12px; }
  </style>
</head>
<body>
<div class="app-container">
  <div class="status-bar">
    <span class="time" id="current-time">08:24</span>
    <span class="offline-badge" id="network-badge">● HORS LIGNE</span>
  </div>

  <div id="list-view">
    <div class="screen-header">
      <a href="e2_dashboard.html" style="color:white;text-decoration:none;font-size:22px;padding:8px 12px 8px 4px;">‹</a>
      <img src="../assets/logo.png" alt="Logo HealthGuard IA" style="width:34px;height:34px;border-radius:10px;object-fit:cover;background:#ffffff;padding:4px;">
      <div style="flex:1">
        <div style="font-size:16px;font-weight:700;">Dossiers Patients</div>
        <div style="font-size:12px;opacity:0.8;" id="count-label">0 patients</div>
      </div>
      <button onclick="showNewPatientForm()" style="background:rgba(255,255,255,0.2);border:none;color:white;font-size:12px;padding:6px 10px;border-radius:16px;cursor:pointer;">+ Nouveau</button>
    </div>

    <div class="search-bar">
      <input type="text" class="search-input" id="search-input" placeholder="Rechercher par nom ou village..." oninput="filterPatients(this.value)">
    </div>

    <div class="patient-list" id="patient-list"></div>

    <div class="new-patient-btn">
      <button class="btn btn-primary btn-full" onclick="window.location.href='e3_consultation.html'">Nouvelle consultation</button>
    </div>
  </div>

  <div id="record-view" style="display:none;">
    <div class="screen-header">
      <button onclick="backToList()" style="background:none;border:none;color:white;font-size:22px;padding:8px 12px 8px 4px;cursor:pointer;">‹</button>
      <div style="flex:1">
        <div style="font-size:16px;font-weight:700;">Dossier Patient</div>
      </div>
      <button onclick="newConsultForPatient()" style="background:rgba(255,255,255,0.2);border:none;color:white;font-size:12px;padding:6px 10px;border-radius:16px;cursor:pointer;">Consulter</button>
    </div>

    <div class="record-header">
      <div class="record-name" id="record-name">-</div>
      <div class="record-meta" id="record-meta">-</div>
    </div>

    <div class="record-tabs">
      <div class="record-tab active" onclick="switchTab('info')">Info</div>
      <div class="record-tab" onclick="switchTab('history')">Historique</div>
      <div class="record-tab" onclick="switchTab('suivi')">Suivi</div>
    </div>

    <div class="tab-content active" id="tab-info">
      <div class="info-row"><span class="info-label">Nom</span><span class="info-value" id="ri-nom">-</span></div>
      <div class="info-row"><span class="info-label">Age</span><span class="info-value" id="ri-age">-</span></div>
      <div class="info-row"><span class="info-label">Sexe</span><span class="info-value" id="ri-sexe">-</span></div>
      <div class="info-row"><span class="info-label">Village</span><span class="info-value" id="ri-village">-</span></div>
      <div class="info-row"><span class="info-label">Derniere visite</span><span class="info-value" id="ri-last-visit">-</span></div>
      <div class="info-row"><span class="info-label">Consultations</span><span class="info-value" id="ri-nb-consult">0</span></div>
    </div>

    <div class="tab-content" id="tab-history">
      <div id="history-list"></div>
    </div>

    <div class="tab-content" id="tab-suivi">
      <div style="padding:16px;font-size:14px;color:var(--color-text-secondary);">
        <div style="margin-bottom:12px;font-weight:600;color:var(--color-text-primary);">Rappels de suivi</div>
        <div id="suivi-reminders">Aucun suivi programme.</div>
      </div>
    </div>
  </div>
</div>

<script>
  const API = '';
  let currentPatient = null;
  let allPatients = [];

  function updateClock() {
    const now = new Date();
    document.getElementById('current-time').textContent =
      String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
  }
  updateClock();
  setInterval(updateClock, 10000);

  function updateNet() {
    const badge = document.getElementById('network-badge');
    badge.textContent = navigator.onLine ? '● EN LIGNE' : '● HORS LIGNE';
    badge.style.backgroundColor = navigator.onLine ? 'var(--color-vert)' : 'var(--color-orange)';
  }
  updateNet();
  window.addEventListener('online', updateNet);
  window.addEventListener('offline', updateNet);

  function deriveAge(dateNaissance) {
    if (!dateNaissance) return null;
    const year = parseInt(String(dateNaissance).slice(0, 4), 10);
    if (!year) return null;
    return new Date().getFullYear() - year;
  }

  function buildPatientsFromLocalStorage() {
    const consultations = JSON.parse(localStorage.getItem('hg_consultations') || '[]');
    const patientMap = {};
    consultations.forEach(c => {
      const key = c.patient_id || c.patient_nom;
      if (!patientMap[key]) {
        patientMap[key] = {
          patient_id: c.patient_id || null,
          nom: c.patient_nom,
          age: c.age_ans || null,
          sexe: c.sexe || null,
          village: c.village_code || null,
          nb: 0,
          consultations: []
        };
      }
      patientMap[key].nb++;
      patientMap[key].consultations.push(c);
      patientMap[key].dernier_diag = c.diagnostic || 'Voir historique';
      patientMap[key].dernier_code = c.couleur || 'vert';
      patientMap[key].date = c.date ? new Date(c.date).toLocaleDateString('fr-FR') : '';
    });
    return Object.values(patientMap);
  }

  async function loadPatients() {
    try {
      const response = await fetch(`${API}/api/v1/patients`, { signal: AbortSignal.timeout(3000) });
      if (response.ok) {
        const payload = await response.json();
        allPatients = (payload.patients || []).map(p => ({
          patient_id: p.id,
          nom: p.nom,
          age: deriveAge(p.date_naissance),
          sexe: p.sexe,
          village: p.village_code,
          nb: p.consultation_count || 0,
          date: p.last_consultation_at ? new Date(p.last_consultation_at).toLocaleDateString('fr-FR') : '',
          consultations: [],
          dernier_diag: 'Voir historique',
          dernier_code: 'vert'
        }));
        renderPatientList(allPatients);
        return;
      }
    } catch (e) {
      console.warn('API patients indisponible', e);
    }

    allPatients = buildPatientsFromLocalStorage();
    renderPatientList(allPatients);
  }

  function renderPatientList(patients) {
    document.getElementById('count-label').textContent = patients.length + ' patient' + (patients.length > 1 ? 's' : '');
    const list = document.getElementById('patient-list');
    if (patients.length === 0) {
      list.innerHTML = `<div class="empty-state"><div class="empty-icon">👤</div><div>Aucun patient enregistre</div><div style="font-size:12px;margin-top:6px;">Creez une consultation pour enregistrer le premier patient.</div></div>`;
      return;
    }

    list.innerHTML = patients.map((p, i) => {
      const initials = (p.nom || '?').split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase();
      const badgeClass = p.dernier_code === 'rouge' ? 'badge-rouge' : p.dernier_code === 'orange' ? 'badge-orange' : 'badge-vert';
      const ageText = p.age == null ? '?' : (p.age < 1 ? Math.round(p.age * 12) + ' mois' : p.age + ' ans');
      const sexeText = p.sexe === 'F' ? 'Feminin' : p.sexe === 'M' ? 'Masculin' : 'Non renseigne';
      return `
        <div class="patient-item" onclick="openPatient(${i})">
          <div class="patient-avatar ${p.sexe === 'F' ? 'f' : ''}">${initials}</div>
          <div class="patient-info">
            <div class="patient-name">${p.nom || 'Patient anonyme'}</div>
            <div class="patient-meta">${ageText} · ${sexeText} · ${p.village || 'Village N/A'}</div>
            <div class="patient-meta" style="margin-top:2px;">${p.nb || 0} consultation(s) · ${p.date || ''}</div>
          </div>
          <span class="patient-badge ${badgeClass}">${p.dernier_diag || 'Historique'}</span>
        </div>`;
    }).join('');
  }

  function filterPatients(query) {
    const q = query.toLowerCase().trim();
    if (!q) {
      renderPatientList(allPatients);
      return;
    }
    const filtered = allPatients.filter(p =>
      (p.nom || '').toLowerCase().includes(q) || (p.village || '').toLowerCase().includes(q)
    );
    renderPatientList(filtered);
  }

  async function openPatient(idx) {
    currentPatient = allPatients[idx];
    if (currentPatient.patient_id) {
      try {
        const response = await fetch(`${API}/api/v1/patients/${currentPatient.patient_id}`, { signal: AbortSignal.timeout(3000) });
        if (response.ok) {
          const payload = await response.json();
          currentPatient.apiRecord = payload;
        }
      } catch (e) {
        console.warn('Lecture patient detail impossible', e);
      }
    }

    document.getElementById('list-view').style.display = 'none';
    document.getElementById('record-view').style.display = 'block';

    const p = currentPatient;
    const info = p.apiRecord ? p.apiRecord.patient : null;
    const age = p.age != null ? p.age : deriveAge(info ? info.date_naissance : null);
    const ageText = age == null ? '' : (age < 1 ? Math.round(age * 12) + ' mois' : age + ' ans');
    const sexe = (info && info.sexe) || p.sexe;
    const village = (info && info.village_code) || p.village;

    document.getElementById('record-name').textContent = (info && info.nom) || p.nom || 'Patient';
    document.getElementById('record-meta').textContent = `${ageText} · ${sexe || ''} · ${village || ''}`;
    document.getElementById('ri-nom').textContent = (info && info.nom) || p.nom || '';
    document.getElementById('ri-age').textContent = ageText;
    document.getElementById('ri-sexe').textContent = sexe || '';
    document.getElementById('ri-village').textContent = village || '';
    document.getElementById('ri-last-visit').textContent = p.date || '';
    document.getElementById('ri-nb-consult').textContent = p.nb || 0;

    const consultList = p.apiRecord ? p.apiRecord.consultations : (p.consultations || []);
    const histList = document.getElementById('history-list');
    if (!consultList || consultList.length === 0) {
      histList.innerHTML = '<div class="empty-state"><div>Aucun historique disponible.</div></div>';
    } else {
      histList.innerHTML = consultList.map(c => {
        const dateVal = c.date_heure || c.date || Date.now();
        const d = new Date(dateVal);
        const color = (c.couleur || c.couleur_alerte || (c.gravite_score === 3 ? 'rouge' : c.gravite_score === 2 ? 'orange' : 'vert')).toString().toLowerCase();
        const diag = c.maladie_code || c.diagnostic || 'Diagnostic';
        return `
          <div class="consult-hist-item">
            <div class="consult-dot-big ${color.includes('rouge') ? 'rouge' : color.includes('orange') ? 'orange' : 'vert'}"></div>
            <div style="flex:1;">
              <div style="font-size:14px;font-weight:600;">${diag}</div>
              <div style="font-size:12px;color:var(--color-text-secondary);">${d.toLocaleDateString('fr-FR')} a ${d.toLocaleTimeString('fr-FR', {hour:'2-digit',minute:'2-digit'})}</div>
            </div>
          </div>`;
      }).join('');
    }
  }

  function switchTab(tab) {
    document.querySelectorAll('.record-tab').forEach((t, i) => {
      const tabs = ['info', 'history', 'suivi'];
      t.classList.toggle('active', tabs[i] === tab);
    });
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
  }

  function backToList() {
    document.getElementById('list-view').style.display = 'block';
    document.getElementById('record-view').style.display = 'none';
    currentPatient = null;
  }

  function newConsultForPatient() {
    if (currentPatient) {
      const info = currentPatient.apiRecord ? currentPatient.apiRecord.patient : null;
      localStorage.setItem('hg_current_consultation', JSON.stringify({
        patient_id: currentPatient.patient_id || null,
        patient_nom: (info && info.nom) || currentPatient.nom,
        age_ans: currentPatient.age,
        sexe: (info && info.sexe) || currentPatient.sexe,
        village_code: (info && info.village_code) || currentPatient.village || null
      }));
    }
    window.location.href = 'e3_consultation.html';
  }

  function showNewPatientForm() {
    localStorage.removeItem('hg_current_consultation');
    window.location.href = 'e3_consultation.html';
  }

  loadPatients();
</script>
<script src="../js/nav.js"></script>
</body>
</html>
