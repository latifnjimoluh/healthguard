server {
    listen 80;
    server_name healthguardia-project-keyce-school.movie-in-the-park.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name healthguardia-project-keyce-school.movie-in-the-park.com;
    charset utf-8;

    ssl_certificate     /etc/letsencrypt/live/movie-in-the-park.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/movie-in-the-park.com/privkey.pem;
    ssl_protocols       TLSv1.3;
    ssl_prefer_server_ciphers off;
    # TLS 1.3 ne supporte que des suites de chiffrement fortes par defaut.

    access_log /var/log/nginx/healthguard-access.log;
    error_log  /var/log/nginx/healthguard-error.log warn;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
